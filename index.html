<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Elegant Birthday Cake 🎂</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(to top, #ffd1dc, #ff85a2);
}

/* UI */
#ui {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
}

h2 {
  font-weight:300;
  letter-spacing:1px;
}

input, button {
  padding:10px;
  border-radius:20px;
  border:none;
  margin:5px;
}

button {
  background:#ff4d6d;
  color:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  cursor:pointer;
}

#timer {
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="ui">
  <h2>🎀 Elegant Birthday 🎀</h2>
  <input id="age" type="number" placeholder="Umur">
  <button onclick="start()">Mulai</button>
  <div id="timer"></div>
</div>

<audio id="music">
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let candles=[], flames=[];
let timeLeft=10, gameActive=false;

// START
function start(){
  document.getElementById("ui").style.display="none";
  document.getElementById("music").play();

  init();
  createCake();
  setupMic();

  gameActive=true;
  countdown();
}

// SCENE
function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  camera.position.z=6;

  // LIGHTING (elegant pink)
  let light1=new THREE.PointLight(0xffc0cb,1.5,20);
  light1.position.set(3,5,3);

  let light2=new THREE.PointLight(0xffa07a,1,20);
  light2.position.set(-3,3,-3);

  let ambient=new THREE.AmbientLight(0xffffff,0.4);

  scene.add(light1, light2, ambient);

  animate();
}

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  scene.rotation.y += 0.002;

  flames.forEach(f=>{
    f.scale.y = 1 + Math.random()*0.5;
    f.material.opacity = 0.6 + Math.random()*0.4;
  });

  renderer.render(scene,camera);
}

// 🎂 CREATE CAKE (REALISTIC)
function createCake(){
  const loader = new THREE.TextureLoader();

  // TEXTURE COKLAT
  let cakeTexture = loader.load(
    "https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=800"
  );

  cakeTexture.wrapS = THREE.RepeatWrapping;
  cakeTexture.wrapT = THREE.RepeatWrapping;
  cakeTexture.repeat.set(2,1);

  let cakeMaterial = new THREE.MeshStandardMaterial({
    map: cakeTexture,
    color: 0x4b2e1e,
    roughness: 0.85,
    metalness: 0.05
  });

  let cake = new THREE.Mesh(
    new THREE.CylinderGeometry(2,2,1,64),
    cakeMaterial
  );

  scene.add(cake);

  // 🍫 GLAZE (atas kue)
  let glaze = new THREE.Mesh(
    new THREE.CylinderGeometry(2.05,2.05,0.15,64),
    new THREE.MeshStandardMaterial({
      color:0x3b1f14,
      roughness:0.4
    })
  );
  glaze.position.y = 0.55;
  scene.add(glaze);

  // 🍰 LAYER CREAM
  let layer = new THREE.Mesh(
    new THREE.CylinderGeometry(2.02,2.02,0.2,64),
    new THREE.MeshStandardMaterial({color:0xfff5e1})
  );
  layer.position.y = 0.2;
  scene.add(layer);

  // 🍓 CREAM TOPPING
  for(let i=0;i<10;i++){
    let cream = new THREE.Mesh(
      new THREE.SphereGeometry(0.2),
      new THREE.MeshStandardMaterial({color:0xffffff})
    );

    cream.position.set(
      Math.cos(i*2*Math.PI/10)*1.7,
      0.7,
      Math.sin(i*2*Math.PI/10)*1.7
    );
    scene.add(cream);
  }

  // 🍓 STROBERI
  for(let i=0;i<5;i++){
    let strawberry = new THREE.Mesh(
      new THREE.SphereGeometry(0.15),
      new THREE.MeshStandardMaterial({color:0xff2e63})
    );

    strawberry.position.set(
      Math.cos(i*2*Math.PI/5)*1.2,
      1,
      Math.sin(i*2*Math.PI/5)*1.2
    );
    scene.add(strawberry);
  }

  // 🎉 LILIN SESUAI UMUR
  let age = parseInt(document.getElementById("age").value)||5;

  for(let i=0;i<age;i++){
    let candle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05,0.05,0.5),
      new THREE.MeshStandardMaterial({color:0xffffff})
    );

    candle.position.set(
      Math.cos(i*2*Math.PI/age)*1.3,
      0.9,
      Math.sin(i*2*Math.PI/age)*1.3
    );

    scene.add(candle);
    candles.push(candle);

    // 🔥 FLAME + GLOW
    let flame = new THREE.Mesh(
      new THREE.SphereGeometry(0.1),
      new THREE.MeshBasicMaterial({
        color:0xffcc00,
        transparent:true
      })
    );

    let glow = new THREE.PointLight(0xffaa00,1,3);
    glow.position.y = 0.2;

    candle.add(flame);
    candle.add(glow);

    flame.position.y = 0.4;

    flames.push(flame);
  }
}

// 🎤 MIC
function setupMic(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    let ctx=new AudioContext();
    let mic=ctx.createMediaStreamSource(stream);
    let analyser=ctx.createAnalyser();

    mic.connect(analyser);
    analyser.fftSize=256;

    let data=new Uint8Array(analyser.frequencyBinCount);

    function detect(){
      analyser.getByteFrequencyData(data);
      let volume=data.reduce((a,b)=>a+b)/data.length;

      if(volume>65 && gameActive){
        blow();
      }

      requestAnimationFrame(detect);
    }
    detect();
  });
}

// TIUP
function blow(){
  candles.forEach(c=>scene.remove(c));
  flames=[];
  gameActive=false;
  alert("🎉 Selamat! Lilin padam!");
}

// TIMER
function countdown(){
  let t=document.getElementById("timer");

  let interval=setInterval(()=>{
    timeLeft--;
    t.innerText="⏳ "+timeLeft+" detik";

    if(timeLeft<=0){
      clearInterval(interval);
      if(gameActive){
        alert("😢 Gagal! Waktu habis");
      }
    }
  },1000);
}
</script>

</body>
</html>
